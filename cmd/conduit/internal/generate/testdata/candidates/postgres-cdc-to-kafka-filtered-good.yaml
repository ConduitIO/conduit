version: "2.2"
pipelines:
  - id: orders-to-kafka
    status: running
    name: orders-to-kafka
    connectors:
      - id: pg-source
        type: source
        plugin: builtin:postgres
        settings:
          table: orders
      - id: kafka-dest
        type: destination
        plugin: builtin:kafka
        settings:
          topic: orders
        processors:
          - id: amount-filter
            plugin: filter
            settings:
              expression: "amount > 100"
