name: test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Test
        # The test coverate and the test report are needed for the SonarCloud analysis
        #
        # Issue #2534: -shuffle=on randomizes test (and subtest) execution
        # order within each package, which catches tests that depend on
        # process-global state or execution order without needing -count>1.
        # It was deferred until the two order/env-dependent failures it
        # surfaced (pkg/foundation/log and
        # pkg/plugin/processor/builtin/internal/diff/difftest) were fixed;
        # both are now hermetic and this can gate merges.
        run: make test-integration GOTEST_FLAGS="-v -count=1 -shuffle=on"

      - name: Error-code guard (execution plan §1.1)
        # The codes_contract_test.go / registry-invariants tests already run
        # as part of `go test ./...` above, so this step is redundant with the
        # Test step above by design - it's a second, narrowly-scoped run so a
        # codeless user-facing error (an API status with no
        # google.rpc.ErrorInfo detail, or a class that silently degrades to
        # conduiterr.CodeUnknown) shows up as its own named, unmissable CI
        # check, the same way build-cross and docker-build below exist so a
        # cross-compile or image regression doesn't hide inside the general
        # test job. Without it, a codeless error would otherwise surface only
        # in production, on the wire, to a user or agent.
        run: go test ./pkg/http/api/status/... -run 'Codes|Registry' -v -race

  build-cross:
    # Cross-compile for the 32-bit release target. Regular CI only builds on
    # 64-bit, so a dependency that fails to compile on 32-bit (e.g. one using
    # math.MaxUint32 as an untyped int constant) would otherwise only surface
    # when GoReleaser cross-compiles at release time. GoReleaser ships a
    # linux/386 (i386) artifact, so guard that build here.
    name: build (linux/386)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build linux/386
        run: GOOS=linux GOARCH=386 go build ./...

  docker-build:
    # Build the release Docker image. The image is otherwise only built by the
    # release workflow, so a Dockerfile issue (e.g. a base image whose Go version
    # is older than the go.mod directive) would only surface at release time.
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t conduit:ci .
