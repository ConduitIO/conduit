name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set GORELEASER_PREVIOUS_TAG in actual release
        if: ${{ !contains(github.ref, '-nightly') }}
        # find previous tag by filtering out nightly tags and choosing the
        # second to last tag (last one is the current release)
        run: |
          prev_tag=$(git tag | grep -v "nightly" | sort -r --version-sort | head -n 2 | tail -n 1)
          echo "GORELEASER_PREVIOUS_TAG=$prev_tag" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

  build-push-docker-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Makes no sense to have an image with tag v0, hence the check in the last line.
          tags: |
            type=semver,pattern={{raw}}
            type=raw,value=latest-nightly,enable=${{ contains(github.ref, '-nightly')  }}
            type=semver,pattern=v{{major}}.{{minor}},enable=${{ !contains(github.ref, '-nightly') }}
            type=semver,pattern=v{{major}},enable=${{ !contains(github.ref, '-nightly') && !startsWith(github.ref, 'refs/tags/v0.') }}
          labels: |
            maintainer=ConduitIO
            org.opencontainers.image.title=Conduit
            org.opencontainers.image.description=Conduit is a data streaming tool written in Go. It aims to provide the best user experience for building and running real-time data pipelines. Conduit comes with batteries included, it provides a UI, common connectors, transforms and observability data out of the box.
            org.opencontainers.image.vendor=ConduitIO

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  post-release-version-bump:
    name: Bump built-in connector version for next development cycle
    runs-on: ubuntu-latest
    # This job should only run after the actual release (goreleaser, docker build) is complete.
    needs: [release, build-push-docker-image]
    # Only run for actual release tags (e.g., v1.2.3), not for nightly builds.
    if: ${{ !contains(github.ref, '-nightly') }}
    permissions:
      contents: write # Required for git push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git history manipulation by the script
          ref: main # Ensure we are on the main branch for the commit

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod' # Needed for potential Go tools if the script evolves

      - name: Calculate next development version
        id: calculate_version
        run: |
          current_tag="${{ github.ref_name }}" # e.g., v1.2.3
          echo "Current tag: $current_tag"

          # Remove 'v' prefix if present for parsing
          version_without_v="${current_tag#v}" # e.g., 1.2.3

          # Split into major, minor, patch components
          IFS='.' read -r major minor patch <<< "$version_without_v"

          # Increment minor version, set patch to 0, append -develop suffix.
          # Use 10# to force base 10 for arithmetic to handle leading zeros safely.
          next_minor=$((10#$minor + 1))
          next_dev_version="v${major}.${next_minor}.0-develop"

          echo "Next development version: $next_dev_version"
          # Set the calculated version as an output variable for subsequent steps
          echo "next_dev_version=$next_dev_version" >> $GITHUB_OUTPUT

      - name: Update built-in connector version
        # Execute the pre-existing script with the calculated development version
        run: |
          ./scripts/update-builtin-connector-version.sh "${{ steps.calculate_version.outputs.next_dev_version }}"
