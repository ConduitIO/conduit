version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - durationcheck
    - errcheck
    - errname
    - exhaustive
    - forbidigo
    - goconst
    - gocritic
    - gocyclo
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - makezero
    - noctx
    - nolintlint
    - predeclared
    # - revive # TODO enable
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unused
    - wastedassign
    - whitespace
  settings:
    depguard:
      rules:
        Main:
          deny:
            - pkg: errors
              desc: To accommodate for custom error creation and handling use Conduit's 'cerrors' package instead.
            - pkg: golang.org/x/xerrors
              desc: To accommodate for custom error creation and handling use Conduit's 'cerrors' package instead.
            - pkg: github.com/golang/mock
              desc: github.com/golang/mock is deprecated, use go.uber.org/mock instead.
            - pkg: encoding/json
              desc: github.com/goccy/go-json is preferred for performance reasons.
    forbidigo:
      # Needed for the pconnector.*Request field-access pattern below: without
      # analyze-types, forbidigo only has literal source text to match against,
      # and cannot tell a `config.Config`-typed selector from any other `.Config`
      # access.
      analyze-types: true
      forbid:
        # conduiterr#2526 follow-up: construction must go through New/Wrap (or the
        # WithCode escape hatch), which guarantee a stack frame and a validated,
        # registered Code. A raw literal skips both.
        #
        # Caveat: forbidigo only matches Ident/SelectorExpr node text, not the
        # enclosing composite literal, so it cannot distinguish "constructing
        # ConduitError{}" from "naming the ConduitError type" (e.g. as a var, param,
        # or return type). In this codebase the type is meant to be reached via
        # New/Wrap/Get, not named directly outside the package, so forbidding the
        # bare identifier is the closest enforceable guard and today has zero known
        # legitimate hits outside the package/tests (verified by grep). It also
        # will not catch the literal if conduiterr is imported under a different
        # local name.
        - pattern: '^conduiterr\.ConduitError$'
          msg: construct via conduiterr.New, conduiterr.Wrap, or conduiterr.WithCode instead of a raw ConduitError{} literal - see package doc.
        # Execution plan §1.1 (CI error-code guard): pkg/http/api/status/status.go
        # is the sole sanctioned chokepoint for building a gRPC status at the API
        # boundary — every path through it now guarantees a google.rpc.ErrorInfo
        # detail (see conduitErrorStatus / fallbackStatus). A raw grpcstatus.Error(f)
        # or status.Error(f) call anywhere else under pkg/http/api bypasses that
        # guarantee and reintroduces a codeless status the codes_contract_test.go
        # guard cannot see (it only drives the four exported functions, not every
        # call site). Forbidding the constructor here, structurally, is the
        # backstop for call sites the contract test can't reach.
        #
        # Scope: this repo has exactly two other legitimate handwritten
        # grpcstatus/status.Error(f) call sites today, both excluded below —
        # pkg/http/api/health_server.go (the gRPC health-check protocol reply,
        # not a Conduit business error) and the generated proto/api/v1/*.pb*.go
        # files (already covered by `exclusions.generated: lax`, listed here only
        # for auditability).
        - pattern: '^grpcstatus\.Error(f)?$'
          msg: build gRPC statuses via pkg/http/api/status (PipelineError/ConnectorError/ProcessorError/PluginError), not a raw grpcstatus.Error(f) call - see status.go's fallbackStatus.
        - pattern: '^status\.Error(f)?$'
          msg: build gRPC statuses via pkg/http/api/status (PipelineError/ConnectorError/ProcessorError/PluginError), not a raw status.Error(f) call - see status.go's fallbackStatus.
        # v0.16.1 secrets-redaction follow-up (execution plan §1.1): connector
        # config.Config routinely carries secrets (DB urls with embedded
        # passwords, SASL credentials, access keys) and there is no
        # per-parameter sensitivity metadata yet, so it must never be logged
        # raw - see pkg/foundation/log/redact.go.
        #
        # This pattern only catches a direct `.Config`/`.ConfigBefore`/
        # `.ConfigAfter` field read on one of the 8 pconnector request types
        # that carry connector settings (verified empirically: with
        # analyze-types on, forbidigo expands a field-selector expression like
        # `in.Config` to "pconnector.SourceConfigureRequest.Config", but a
        # composite literal key such as `pconnector.SourceConfigureRequest{Config:
        # cfg}` expands to just "pconnector.Config" - so building the real
        # request to send to a plugin does not trip this rule, only reading the
        # field back out, e.g. to log it, does). Wrapping the value in
        # log.RedactAll(...) still trips it, since forbidigo has no way to see
        # the wrapping call - those (currently 10, all in
        # pkg/plugin/connector/builtin/{source,destination}.go) need a
        # `//nolint:forbidigo` with that justification.
        #
        # Known gap, documented rather than silently accepted: this does NOT
        # cover pkg/connector/{source,destination}.go's
        # `oldConfig`/`newConfig map[string]string` (bare locals, not a
        # selector on a named type - forbidigo has no type info for them) or
        # sandbox.go's generic `res any` echoed on a cancelled context (same
        # reason, plus `res`/`oldConfig`/`newConfig` are reused throughout
        # their functions for legitimate, unrelated purposes, so a name-based
        # rule there would be all noise). sandbox.go's site has a dedicated
        # regression test (pkg/plugin/connector/builtin/redact_test.go); the
        # pkg/connector default branch is unreachable today (isEqual(nil, nil)
        # returns early before the switch, per its own "should never happen"
        # comment) and is fixed defensively, sharing the same RedactAll
        # covered by pkg/foundation/log's tests, but has no dedicated
        # reachability test since there is no live path to drive.
        - pattern: '^pconnector\.(Source|Destination)(Configure|LifecycleOnCreated|LifecycleOnUpdated|LifecycleOnDeleted)Request\.(Config|ConfigBefore|ConfigAfter)$'
          pkg: '^github\.com/conduitio/conduit-connector-protocol/pconnector$'
          msg: never log a raw pconnector request Config/ConfigBefore/ConfigAfter field - wrap it in log.RedactAll(...) (pkg/foundation/log/redact.go) and silence this line with a `//nolint:forbidigo` explaining it is wrapped.
      exclude-godoc-examples: true
    gocyclo:
      min-complexity: 20
    goheader:
      values:
        regexp:
          copyright-year: 20[2-9]\d
      template-path: .golangci.goheader.template
    nolintlint:
      allow-unused: false # report any unused nolint directives
      require-explanation: true # require an explanation for nolint directives
      require-specific: true # require nolint directives to mention the specific linter being suppressed
  exclusions:
    generated: lax
    paths:
      - ^examples/
      - ^pkg/plugin/processor/builtin/internal/diff # external code
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - goconst
        path: pkg/plugin/processor/builtin/impl
      - linters:
          - goconst
        # test fixtures and acceptance-test harnesses are not named *_test.go
        # but are test-only code where repeated literals are expected
        path: (pkg/provisioning/test/|_testing\.go)
      - linters:
          - staticcheck
        text: "QF1008:" # could remove embedded field from selector
      - linters:
          - dogsled
          - gosec
          - goconst
          - forbidigo
        path: (.+)_test\.go
      - linters:
          - forbidigo
        # conduiterr's own constructors (New/Wrap/WithCode) are the only place
        # allowed to build a ConduitError{} literal directly.
        path: ^pkg/foundation/cerrors/conduiterr/
      - linters:
          - forbidigo
        text: 'grpcstatus\.Error|status\.Error'
        # The grpcstatus.Error(f)/status.Error(f) forbid pair (execution plan
        # §1.1) only polices pkg/http/api - the API error boundary. Everywhere
        # else in the tree keeps constructing gRPC statuses however it always
        # has (e.g. proto/api/v1/*.pb*.go, which is also `generated: lax`).
        path-except: ^pkg/http/api/
      - linters:
          - forbidigo
        text: 'grpcstatus\.Error|status\.Error'
        # health_server.go implements the gRPC health-check protocol reply
        # (grpc.health.v1), not a Conduit business error - it has no
        # ConduitError code to carry and isn't reached by codes_contract_test.go.
        path: ^pkg/http/api/health_server\.go$
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofmt:
      simplify: false
  exclusions:
    generated: lax
    paths:
      - ^examples/
      - ^pkg/plugin/processor/builtin/internal/diff
